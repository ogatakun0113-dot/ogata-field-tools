name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. リポジトリのコードを取得
      uses: actions/checkout@v4

    - name: 2. Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Javaのセットアップ
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Flutterのセットアップ
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: 5. Android SDKの環境設定
      uses: android-actions/setup-android@v3

    - name: 6. 必要なパッケージのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 7. Flet APKのビルド実行（最新無人モード）
      run: |
        flet build apk --no-interactive

    - name: 8. 完成したAPKファイルを保存
      uses: actions/upload-artifact@v4
      with:
        name: ogata-field-tools-apk
        path: build/apk/*.apk
