name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. リポジトリのコードを取得
      uses: actions/checkout@v4

    - name: 2. Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Javaのセットアップ
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. 必要なパッケージと工具のインストール
      run: |
        python -m pip install --upgrade pip
        pip install "flet[cli]==0.85.2"

    - name: 5. Flet APKのビルド実行
      run: |
        python -m flet build apk --no-interactive

    - name: 6. 完成したAPKファイルを保存
      uses: actions/upload-artifact@v4
      with:
        name: ogata-field-tools-apk
        path: build/apk/*.apk
