name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. リポジトリのコードを取得
      uses: actions/checkout@v4

    - name: 2. Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Javaのセットアップ
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Flutterのセットアップ
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: 5. Android SDKの環境設定
      uses: android-actions/setup-android@v3

    - name: 6. 必要なパッケージとビルド工具のインストール
      run: |
        python -m pip install --upgrade pip
        pip install "flet[cli]==0.85.2"

    - name: 7. Fletアプリ環境の初期化（迷子防止の特効薬）
      run: |
        # 最新仕様に合わせて、ロボットの作業場所にアプリ環境を正しく初期化します
        flet create .

    - name: 8. Flet APKのビルド実行
      run: |
        flet build apk --no-interactive

    - name: 9. 完成したAPKファイルを保存
      uses: actions/upload-artifact@v4
      with:
        name: ogata-field-tools-apk
        path: build/apk/*.apk
